[project]
site_name = "bdbox"
site_description = "Interactive parametric build123d model development: live parameter panel, named presets, automatic CLI, and one-command export."
site_author = "Stephen Kent"
site_url = "https://smkent.github.io/bdbox"
repo_url = "https://github.com/smkent/bdbox"
repo_name = "smkent/bdbox"
copyright = "&copy; 2026 Stephen Kent"

nav = [
  { "About" = [
    "index.md",
    "background.md",
    "license.md",
    "contributing.md",
  ] },
  { "Features" = [
    { "Actions" = [
      "actions/index.md",
      "actions/view.md",
      "actions/export.md",
    ] },
    { "Parameters" = [
      "parameters/index.md",
      "parameters/fields.md",
      "parameters/presets.md",
      "parameters/cli.md",
      "parameters/panel.md",
    ] },
  ] },
  { "API Reference" = [
    { "bdbox" = [
      "api/parameters.md",
      "api/fields.md",
      "api/presets.md",
      "api/model.md",
      "api/geometry.md",
      "api/errors.md",
    ] },
  ] },
  { "Development" = [
    { "Development" = [
      "development/requirements.md",
      "development/workflow.md",
      "development/updates.md",
    ] },
    { "Project Operations" = [
      "setup.md",
      "releasing.md",
    ] },
  ] },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.expand",
    "navigation.footer",
    "navigation.instant",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
logo = "lucide/tool-case"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "purple"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "lime"
toggle.icon = "material/weather-night"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/smkent/bdbox"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/bdbox/"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.zensical.extensions.glightbox]

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
paths = ["."]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://build123d.readthedocs.io/en/stable/objects.inv",
]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_section_style = "list"
filters = "public"
heading_level = 1
merge_init_into_class = true
separate_signature = true
show_root_heading = true
show_root_full_path = false
show_signature_annotations = true
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true
